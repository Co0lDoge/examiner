services:
  examiner:
    build: .
    image: examiner:latest
    working_dir: /app 
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - EXAMINER_ADMIN_PASSWORD=admin
    command: [
      "serve", 
      "--db", "examiner.db", 
      "--addr", "0.0.0.0:8080",
      "--questions", "...",
      "--secure-cookies=false", # enable for prod (requires https)

      "--llm-url", "...",
      "--llm-key", "...",
      "--llm-model", "...",
      "--max-followups", "3"
    ]